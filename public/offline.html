<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ScentFolio — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #191210;
      color: #f0dfdb;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Ambient background glow */
    .glow {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(229, 194, 118, 0.04);
      filter: blur(80px);
      pointer-events: none;
    }

    .container {
      max-width: 320px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #e5c276, #c4a35a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: #3f2e00;
      box-shadow: 0 12px 32px rgba(229, 194, 118, 0.2);
    }

    .brand {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.125rem;
      letter-spacing: 0.1em;
      color: #f0dfdb;
      margin-bottom: 2rem;
    }

    .icon-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(229, 194, 118, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      animation: pulse-ring 2s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { border-color: rgba(229, 194, 118, 0.15); transform: scale(1); }
      50% { border-color: rgba(229, 194, 118, 0.3); transform: scale(1.03); }
    }

    .icon-ring span { font-size: 1.75rem; }

    h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f0dfdb;
    }

    p {
      font-size: 0.8125rem;
      color: rgba(208, 196, 187, 0.6);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .btn {
      background: linear-gradient(135deg, #e5c276, #c4a35a);
      color: #3f2e00;
      border: none;
      padding: 0.875rem 2.5rem;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: transform 0.15s;
      box-shadow: 0 8px 24px rgba(229, 194, 118, 0.2);
      display: inline-block;
    }
    .btn:active { transform: scale(0.95); }

    .status {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.6875rem;
      color: rgba(208, 196, 187, 0.4);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(229, 194, 118, 0.4);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .cached-note {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(229, 194, 118, 0.05);
      border: 1px solid rgba(229, 194, 118, 0.1);
      border-radius: 0.75rem;
      font-size: 0.6875rem;
      color: rgba(208, 196, 187, 0.5);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="logo">&#10022;</div>
    <div class="brand">SCENTFOLIO</div>

    <div class="icon-ring"><span>&#128225;</span></div>
    <h1>You&rsquo;re Offline</h1>
    <p>ScentFolio needs an internet connection to sync your collection. Any wear logs you&rsquo;ve queued will sync automatically when you reconnect.</p>

    <button class="btn" onclick="location.reload()">RECONNECT</button>

    <div class="cached-note">
      Your cached fragrances and recent data are still available once you reconnect.
    </div>

    <div class="status">
      <div class="status-dot"></div>
      Waiting for connection
    </div>
  </div>

  <script>
    // Auto-reload when connection returns
    window.addEventListener('online', function() {
      location.reload();
    });
  </script>
</body>
</html>
