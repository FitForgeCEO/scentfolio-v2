name: Deploy to Firebase Hosting
on:
  push:
    branches: [master]

# Least-privilege token; actions pinned to commit SHAs (10 June 2026 review).
# checks: write lets the deploy action report status; contents: read for checkout.
permissions:
  contents: read
  checks: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_FRAGELLA_API_KEY: ${{ secrets.VITE_FRAGELLA_API_KEY }}
          VITE_ENABLE_VECTOR_RECOMMENDER: 'true'

      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCENTFOLIO_APP }}
          channelId: live
          projectId: scentfolio-app
