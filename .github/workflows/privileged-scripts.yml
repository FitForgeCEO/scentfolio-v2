name: Privileged Scripts (Service Role)

# Ad-hoc runner for scripts that need SUPABASE_SERVICE_ROLE_KEY.
# Replaces the previous pattern of running these on Dan's laptop with the key
# in .env.local — part of the C-2 fix from Security-Audit-21Apr2026.md.
#
# Trigger via: GitHub repo -> Actions tab -> "Privileged Scripts (Service Role)"
# -> Run workflow -> pick script from dropdown -> check logs for output.
#
# All scripts require:
#   VITE_SUPABASE_URL          (repo secret, already present for firebase-hosting.yml)
#   SUPABASE_SERVICE_ROLE_KEY  (repo secret, added as part of C-2 rotation)
#
# Hardening (10 June 2026 review): least-privilege token, dispatch inputs
# bound via env (never interpolated into the script body — ${{ }} expands
# before shell parsing, so inline use is a script-injection vector in a job
# holding the service-role key), free-text inputs validated, actions pinned
# to commit SHAs.

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Which privileged script to run'
        required: true
        type: choice
        options:
          - eval-recommender
          - eval-recommender-hybrid
          - embed-fragrances-backfill
          - embed-fragrances-force
      pairs_file:
        description: 'Eval pairs JSON path (only for eval-* scripts)'
        default: 'scripts/eval-pairs.json'
        required: false
      embed_version:
        description: 'Embedding version (only for embed-fragrances-force)'
        default: '4'
        required: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Cache transformers model
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/huggingface
            .cache/transformers
          key: transformers-miniLM-L6-v2

      - name: Install dependencies
        run: npm ci

      - name: Run privileged script
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRIPT: ${{ inputs.script }}
          PAIRS_FILE: ${{ inputs.pairs_file }}
          EMBED_VERSION: ${{ inputs.embed_version }}
        run: |
          set -euo pipefail

          # Validate free-text inputs before use (choice inputs are
          # constrained by the dropdown; these two are not).
          if [[ ! "$PAIRS_FILE" =~ ^scripts/[A-Za-z0-9._/-]+\.json$ ]]; then
            echo "Invalid pairs_file: $PAIRS_FILE" >&2
            exit 1
          fi
          if [[ ! "$EMBED_VERSION" =~ ^[0-9]+$ ]]; then
            echo "Invalid embed_version: $EMBED_VERSION" >&2
            exit 1
          fi

          case "$SCRIPT" in
            eval-recommender)
              npx tsx scripts/eval-recommender.ts --pairs "$PAIRS_FILE"
              ;;
            eval-recommender-hybrid)
              npx tsx scripts/eval-recommender-hybrid.ts --pairs "$PAIRS_FILE"
              ;;
            embed-fragrances-backfill)
              npx tsx scripts/embed-fragrances.ts
              ;;
            embed-fragrances-force)
              npx tsx scripts/embed-fragrances.ts --force --version "$EMBED_VERSION"
              ;;
            *)
              echo "Unknown script: $SCRIPT" >&2
              exit 1
              ;;
          esac
