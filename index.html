  <head>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scentfolio-app.web.app/" />
    <meta property="og:title" content="ScentFolio — Your Fragrance Collection, Beautifully Organised" />
    <meta property="og:description" content="Track your fragrance collection, log daily wears, discover new scents, and share your taste. The Letterboxd for fragrance lovers." />
    <meta property="og:image" content="https://scentfolio-app.web.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ScentFolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ScentFolio — Your Fragrance Collection, Beautifully Organised" />
    <meta name="twitter:description" content="Track your collection, log wears, discover scents. The Letterboxd for fragrance lovers." />
    <meta name="twitter:image" content="https://scentfolio-app.web.app/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#191210" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ScentFolio" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />

    <!-- Fonts — preload icon font for reliability -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" /></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" /></noscript>

    <!-- Icon font reliability — retry on failure, cache-bust on retry -->
    <script>
      (function(){
        function retry(n){
          if(n>=3)return;
          var l=document.createElement('link');
          l.rel='stylesheet';
          l.href='https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap&v='+n;
          document.head.appendChild(l);
          setTimeout(function(){check(n+1)},4000);
        }
        function check(n){
          if(document.fonts&&document.fonts.check('24px "Material Symbols Outlined"'))return;
          retry(n);
        }
        if(document.fonts&&document.fonts.ready){
          document.fonts.ready.then(function(){setTimeout(function(){check(0)},1000)});
        }else{
          setTimeout(function(){check(0)},5000);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Inline splash — visible until React mounts, then replaced -->
      <div id="splash" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#191210;font-family:serif">
        <div style="font-size:36px;font-weight:700;color:#e5c276;letter-spacing:0.05em">SF</div>
        <div style="width:40px;height:1px;background:#e5c276;margin:12px 0;opacity:0.5"></div>
        <div style="font-size:11px;color:#e5c276;letter-spacing:0.2em;opacity:0.6;text-transform:uppercase">ScentFolio</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
